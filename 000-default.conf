<VirtualHost *:80>
    # Указываем, что корень сайта - это папка public
    DocumentRoot /var/www/html/public

    # Настройки для нашей корневой папки
    <Directory /var/www/html/public>
        # Разрешаем использовать .htaccess для переопределения настроек
        AllowOverride All
        # Разрешаем доступ всем
        Require all granted
        # Указываем, какой файл запускать по умолчанию
        DirectoryIndex index.php
    </Directory>

    # Стандартные логи
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
