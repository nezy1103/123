services:
  web:
    build: .
    ports:
      - "8080:80"
    env_file: .env
    depends_on:
      - db
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecourses
      MYSQL_USER: ecourses_user
      MYSQL_PASSWORD: ecourses_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  db_data:
